name: Build & Deploy Spring Boot to Azure VM

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install Java 11
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      # Debug repository contents
      - name: Debug Files
        run: |
          pwd
          ls -la
          echo "Current Directory:"
          pwd

      # Make Maven Wrapper executable
      - name: Make mvnw executable
        run: chmod +x mvnw

      # Build Spring Boot application
      - name: Build Project
        run: ./mvnw clean package -DskipTests

      # Verify JAR was created
      - name: Verify Build Output
        run: |
          echo "Target directory:"
          ls -la target

      # Copy JAR to Azure VM
      - name: Copy JAR to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/azureuser/app"

      # Restart application
      - name: Restart Spring Boot Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            echo "Files copied:"
            ls -l /home/azureuser/app/target

            sudo cp /home/azureuser/app/target/*.jar /opt/myapp/app.jar

            sudo systemctl restart springapp

            sleep 5

            sudo systemctl status springapp --no-pager

            sudo journalctl -u springapp -n 50 --no-pager